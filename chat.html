<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出勤查詢助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { primary: '#6366f1', dark: '#0f0f23', card: '#1a1a3e', surface: '#131328' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    .msg-in { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-ring { animation: pulseRing 1.5s infinite; }
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 70% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    .typing-dot { animation: typingBounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    pre { white-space: pre-wrap; word-break: break-word; }
    .quick-btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-brand-dark text-gray-100 min-h-screen flex flex-col">

  <!-- 頂部 -->
  <header class="bg-brand-surface/80 backdrop-blur border-b border-white/5 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-brand-primary rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      </div>
      <div>
        <h1 class="text-base font-bold">出勤查詢助手</h1>
        <p class="text-xs text-gray-500">打字或語音，直接查詢出勤與請假</p>
      </div>
    </div>
    <button onclick="openSettings()" class="text-gray-500 hover:text-gray-300 transition-colors p-2 rounded-lg hover:bg-white/5">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </button>
  </header>

  <!-- 聊天區 -->
  <main class="flex-1 overflow-y-auto px-4 py-6 space-y-4" id="chatArea">
    <!-- 歡迎訊息 -->
    <div class="msg-in flex gap-3">
      <div class="w-8 h-8 bg-brand-primary rounded-full flex items-center justify-center flex-shrink-0 mt-1">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div class="bg-brand-card rounded-2xl rounded-tl-md px-4 py-3 max-w-[85%]">
        <p class="text-sm leading-relaxed">你好！我是出勤查詢助手。</p>
        <p class="text-sm leading-relaxed mt-2">你可以直接輸入或說出查詢指令，例如：</p>
        <ul class="text-sm text-gray-400 mt-2 space-y-1">
          <li>• 4/2 請假狀況</li>
          <li>• 4/2 病假統計</li>
          <li>• TAO1 4/2 出勤報表</li>
          <li>• 全部倉 4/2 請假統計</li>
        </ul>
      </div>
    </div>
  </main>

  <!-- 快捷按鈕 -->
  <div class="px-4 pb-2 flex gap-2 overflow-x-auto" id="quickBtns">
    <button onclick="sendQuery('4/2請假狀況')" class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs text-gray-400 transition-all">4/2 請假狀況</button>
    <button onclick="sendQuery('4/2病假統計')" class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs text-gray-400 transition-all">4/2 病假統計</button>
    <button onclick="sendQuery('4/2出勤人員明細')" class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs text-gray-400 transition-all">4/2 出勤明細</button>
    <button onclick="sendQuery('查詢TAO1 4/2出勤報表')" class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs text-gray-400 transition-all">TAO1 出勤報表</button>
    <button onclick="sendQuery('查詢全部倉別 4/2 請假統計')" class="quick-btn whitespace-nowrap px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs text-gray-400 transition-all">全倉請假統計</button>
  </div>

  <!-- 輸入區 -->
  <div class="bg-brand-surface/80 backdrop-blur border-t border-white/5 px-4 py-3 sticky bottom-0">
    <div class="flex items-center gap-2 max-w-3xl mx-auto">
      <div class="flex-1 relative">
        <input
          type="text"
          id="queryInput"
          placeholder="輸入查詢指令，例如：4/2請假狀況"
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pr-12 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-primary/50 focus:ring-1 focus:ring-brand-primary/30 transition-all"
          onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendFromInput(); }"
        >
      </div>
      <!-- 語音按鈕 -->
      <button
        id="voiceBtn"
        onclick="toggleVoice()"
        class="w-11 h-11 rounded-xl flex items-center justify-center transition-all bg-white/5 border border-white/10 hover:bg-white/10 text-gray-400 hover:text-white flex-shrink-0"
        title="按住說話（語音輸入）"
      >
        <svg id="micIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v1a7 7 0 01-14 0v-1m7 8v4m-4 0h8M12 1a3 3 0 00-3 3v7a3 3 0 006 0V4a3 3 0 00-3-3z"/></svg>
        <svg id="micStopIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
      <!-- 送出按鈕 -->
      <button
        onclick="sendFromInput()"
        class="w-11 h-11 rounded-xl flex items-center justify-center bg-brand-primary hover:bg-brand-primary/80 text-white transition-all flex-shrink-0"
        title="送出查詢"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/></svg>
      </button>
    </div>
    <p id="voiceStatus" class="text-xs text-center text-gray-600 mt-2 hidden"></p>
  </div>

  <!-- Webhook 設定 Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-brand-card border border-white/10 rounded-2xl p-6 w-full max-w-md">
      <h3 class="font-bold text-lg mb-4">Webhook 設定</h3>
      <label class="text-sm text-gray-400 mb-1 block">n8n Webhook URL</label>
      <input
        type="text"
        id="webhookUrlInput"
        class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-primary/50 mb-4"
        placeholder="http://localhost:5678/webhook/attendance-query"
      >
      <p class="text-xs text-gray-500 mb-6">設定你的 n8n Webhook 網址。若 n8n 在本機，通常是上面的預設值。</p>
      <div class="flex gap-3 justify-end">
        <button onclick="closeSettings()" class="px-4 py-2 text-sm text-gray-400 hover:text-white transition-colors">取消</button>
        <button onclick="saveSettings()" class="px-4 py-2 text-sm bg-brand-primary rounded-lg text-white hover:bg-brand-primary/80 transition-all">儲存</button>
      </div>
    </div>
  </div>

<script>
// ========================
// CONFIG（可調整）
// ========================
const DEFAULT_WEBHOOK_URL = 'http://localhost:5678/webhook/attendance-query';
let webhookUrl = localStorage.getItem('webhookUrl') || DEFAULT_WEBHOOK_URL;

// ========================
// 聊天功能
// ========================
const chatArea = document.getElementById('chatArea');
const queryInput = document.getElementById('queryInput');

// 送出輸入框的內容
function sendFromInput() {
  const q = queryInput.value.trim();
  if (!q) return;
  queryInput.value = '';
  sendQuery(q);
}

// 送出查詢
async function sendQuery(query) {
  // 顯示使用者訊息
  appendMessage('user', query);
  // 顯示載入中
  const loadingId = appendLoading();

  try {
    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();
    removeLoading(loadingId);
    appendResult(data);
  } catch (err) {
    removeLoading(loadingId);
    appendMessage('bot', `連線失敗：${err.message}\n\n請確認：\n1. n8n 是否已啟動\n2. Webhook URL 是否正確（點右上角齒輪設定）\n3. Workflow 是否已啟用（Active）`, true);
  }
}

// 顯示使用者訊息
function appendMessage(role, text, isError = false) {
  const div = document.createElement('div');
  div.className = 'msg-in flex gap-3' + (role === 'user' ? ' flex-row-reverse' : '');

  const avatar = role === 'user'
    ? `<div class="w-8 h-8 bg-emerald-600 rounded-full flex items-center justify-center flex-shrink-0 mt-1"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>`
    : `<div class="w-8 h-8 bg-brand-primary rounded-full flex items-center justify-center flex-shrink-0 mt-1"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>`;

  const bgClass = role === 'user'
    ? 'bg-emerald-600/20 rounded-2xl rounded-tr-md'
    : (isError ? 'bg-red-500/10 border border-red-500/20 rounded-2xl rounded-tl-md' : 'bg-brand-card rounded-2xl rounded-tl-md');

  div.innerHTML = `
    ${avatar}
    <div class="${bgClass} px-4 py-3 max-w-[85%]">
      <p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
    </div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

// 顯示查詢結果
function appendResult(data) {
  const div = document.createElement('div');
  div.className = 'msg-in flex gap-3';

  let content = '';

  if (data.success === false && data.error) {
    // 錯誤
    content = `<p class="text-sm text-red-400">${escapeHtml(data.error)}</p>`;
    if (data.hint) content += `<p class="text-xs text-gray-500 mt-1">${escapeHtml(data.hint)}</p>`;
  } else if (data.summaryText) {
    // 摘要
    content = `<p class="text-sm font-medium text-emerald-400 mb-2">${escapeHtml(data.summaryText)}</p>`;

    // 統計
    if (data.totals) {
      content += '<div class="grid grid-cols-2 gap-2 mb-3">';
      for (const [key, val] of Object.entries(data.totals)) {
        if (typeof val === 'object') {
          content += `<div class="col-span-2 bg-white/5 rounded-lg p-2"><p class="text-xs text-gray-500 mb-1">${formatKey(key)}</p>`;
          for (const [k2, v2] of Object.entries(val)) {
            const display = typeof v2 === 'object' ? `${v2.count || 0} 人 / ${v2.workHours || 0}h` : v2;
            content += `<p class="text-xs text-gray-300">${escapeHtml(k2)}：${display}</p>`;
          }
          content += '</div>';
        } else {
          content += `<div class="bg-white/5 rounded-lg p-2"><p class="text-xs text-gray-500">${formatKey(key)}</p><p class="text-sm font-bold text-white">${escapeHtml(String(val))}</p></div>`;
        }
      }
      content += '</div>';
    }

    // 明細（最多顯示 10 筆）
    if (data.rows && data.rows.length > 0) {
      const showRows = data.rows.slice(0, 10);
      content += '<div class="space-y-1 mb-2">';
      content += '<p class="text-xs text-gray-500">明細（前 ' + Math.min(10, data.rows.length) + ' 筆' + (data.rows.length > 10 ? `，共 ${data.rows.length} 筆` : '') + '）：</p>';
      content += '<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr class="text-gray-500 border-b border-white/5">';
      content += '<th class="text-left py-1 pr-2">倉</th><th class="text-left py-1 pr-2">姓名</th><th class="text-left py-1 pr-2">部門</th><th class="text-left py-1 pr-2">班別</th><th class="text-left py-1 pr-2">狀態</th><th class="text-left py-1">工時</th>';
      content += '</tr></thead><tbody>';
      for (const r of showRows) {
        content += `<tr class="border-b border-white/5 text-gray-300">`;
        content += `<td class="py-1 pr-2">${escapeHtml(r.warehouse||'')}</td>`;
        content += `<td class="py-1 pr-2">${escapeHtml(r.name||'')}</td>`;
        content += `<td class="py-1 pr-2">${escapeHtml(r.department||'')}</td>`;
        content += `<td class="py-1 pr-2">${escapeHtml(r.shift||'')}</td>`;
        content += `<td class="py-1 pr-2">${escapeHtml(r.leaveType||r.attendanceStatus||'')}</td>`;
        content += `<td class="py-1">${escapeHtml(r.workHours||'-')}</td>`;
        content += '</tr>';
      }
      content += '</tbody></table></div></div>';
    }

    // warnings
    if (data.warnings && data.warnings.length > 0) {
      content += `<p class="text-xs text-yellow-500 mt-2">⚠ ${data.warnings.join('; ')}</p>`;
    }
  } else {
    // 原始 JSON
    content = `<pre class="text-xs text-gray-400 overflow-x-auto">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
  }

  div.innerHTML = `
    <div class="w-8 h-8 bg-brand-primary rounded-full flex items-center justify-center flex-shrink-0 mt-1">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </div>
    <div class="bg-brand-card rounded-2xl rounded-tl-md px-4 py-3 max-w-[90%] w-full">${content}</div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

// 載入指示器
let loadingCount = 0;
function appendLoading() {
  const id = 'loading-' + (++loadingCount);
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg-in flex gap-3';
  div.innerHTML = `
    <div class="w-8 h-8 bg-brand-primary rounded-full flex items-center justify-center flex-shrink-0 mt-1">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </div>
    <div class="bg-brand-card rounded-2xl rounded-tl-md px-4 py-3 flex gap-1.5 items-center">
      <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
      <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
      <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
    </div>`;
  chatArea.appendChild(div);
  scrollToBottom();
  return id;
}

function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ========================
// 語音輸入（Web Speech API）
// ========================
let recognition = null;
let isListening = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.lang = 'zh-TW';
  r.continuous = false;
  r.interimResults = true;

  r.onstart = () => {
    isListening = true;
    updateVoiceUI(true);
    showVoiceStatus('正在聆聽...');
  };

  r.onresult = (e) => {
    let final = '';
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (final) {
      queryInput.value = final;
      showVoiceStatus('辨識完成：' + final);
    } else if (interim) {
      queryInput.value = interim;
      showVoiceStatus('辨識中：' + interim);
    }
  };

  r.onend = () => {
    isListening = false;
    updateVoiceUI(false);
    // 如果有辨識結果，自動送出
    const val = queryInput.value.trim();
    if (val) {
      showVoiceStatus('');
      setTimeout(() => sendFromInput(), 300);
    } else {
      showVoiceStatus('未偵測到語音，請再試一次');
      setTimeout(() => showVoiceStatus(''), 3000);
    }
  };

  r.onerror = (e) => {
    isListening = false;
    updateVoiceUI(false);
    if (e.error === 'not-allowed') {
      showVoiceStatus('麥克風權限被拒絕，請在瀏覽器設定中允許');
    } else {
      showVoiceStatus('語音辨識錯誤：' + e.error);
    }
    setTimeout(() => showVoiceStatus(''), 4000);
  };

  return r;
}

function toggleVoice() {
  if (!recognition) {
    recognition = initSpeech();
  }
  if (!recognition) {
    showVoiceStatus('此瀏覽器不支援語音輸入，請使用 Chrome 或 Edge');
    setTimeout(() => showVoiceStatus(''), 4000);
    return;
  }

  if (isListening) {
    recognition.stop();
  } else {
    queryInput.value = '';
    recognition.start();
  }
}

function updateVoiceUI(listening) {
  const btn = document.getElementById('voiceBtn');
  const micIcon = document.getElementById('micIcon');
  const stopIcon = document.getElementById('micStopIcon');
  if (listening) {
    btn.className = 'w-11 h-11 rounded-xl flex items-center justify-center transition-all bg-red-500 text-white flex-shrink-0 pulse-ring';
    micIcon.classList.add('hidden');
    stopIcon.classList.remove('hidden');
  } else {
    btn.className = 'w-11 h-11 rounded-xl flex items-center justify-center transition-all bg-white/5 border border-white/10 hover:bg-white/10 text-gray-400 hover:text-white flex-shrink-0';
    micIcon.classList.remove('hidden');
    stopIcon.classList.add('hidden');
  }
}

function showVoiceStatus(msg) {
  const el = document.getElementById('voiceStatus');
  if (msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

// ========================
// 設定
// ========================
function openSettings() {
  document.getElementById('webhookUrlInput').value = webhookUrl;
  document.getElementById('settingsModal').classList.remove('hidden');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.add('hidden');
}
function saveSettings() {
  const url = document.getElementById('webhookUrlInput').value.trim();
  if (url) {
    webhookUrl = url;
    localStorage.setItem('webhookUrl', url);
  }
  closeSettings();
  appendMessage('bot', `Webhook URL 已更新為：\n${webhookUrl}`);
}

// ========================
// 工具
// ========================
function scrollToBottom() {
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function formatKey(key) {
  const map = {
    totalLeave: '總請假人數', totalSickLeave: '總病假人數', totalRecords: '總筆數',
    totalWorkHours: '總工時', totalOvertimeHours: '總加班時數',
    byWarehouse: '依倉別', byLeaveType: '依假別', byDepartment: '依部門', byShift: '依班別',
  };
  return map[key] || key;
}

// 初始化：聚焦輸入框
queryInput.focus();
</script>
</body>
</html>
