<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#6366f1">
  <title>出勤查詢助手</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.svg">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#0f0f23;color:#e5e7eb;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
    header{background:rgba(19,19,40,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .logo{width:36px;height:36px;background:#6366f1;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
    .hdr-info h1{font-size:15px;font-weight:700;color:#fff}
    .hdr-info p{font-size:11px;color:#6b7280}
    .hdr-left{display:flex;align-items:center;gap:10px}
    #chatArea{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .msg{display:flex;gap:10px;animation:slideIn .3s ease-out}
    .msg.user{flex-direction:row-reverse}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;font-size:14px}
    .avatar.bot{background:#6366f1;color:#fff}
    .avatar.user{background:#059669;color:#fff}
    .bubble{border-radius:16px;padding:12px 16px;max-width:88%;font-size:14px;line-height:1.6}
    .bubble.bot{background:#1a1a3e;border-top-left-radius:6px}
    .bubble.user{background:rgba(5,150,105,.15);border-top-right-radius:6px}
    .bubble.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15)}
    .bubble pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:13px;line-height:1.7}
    .summary-title{color:#34d399;font-weight:600;margin-bottom:8px}
    .leave-group{margin:8px 0}
    .leave-group-title{color:#fbbf24;font-weight:600;font-size:13px;margin:6px 0 2px}
    .leave-person{color:#9ca3af;font-size:12px;padding-left:8px}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin:8px 0}
    .stat-card{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px}
    .stat-label{font-size:11px;color:#6b7280}
    .stat-value{font-size:15px;font-weight:700;color:#fff}
    .email-badge{display:inline-block;background:rgba(99,102,241,.15);color:#818cf8;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:8px}
    .quick-row{padding:8px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .quick-row::-webkit-scrollbar{display:none}
    .qbtn{white-space:nowrap;padding:6px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;font-size:12px;color:#9ca3af;cursor:pointer;transition:.2s}
    .qbtn:active{transform:scale(.95);background:rgba(255,255,255,.08)}
    .input-bar{background:rgba(19,19,40,.9);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.05);padding:10px 16px;position:sticky;bottom:0}
    .input-row{display:flex;align-items:center;gap:8px;max-width:600px;margin:0 auto}
    .input-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;font-size:14px;color:#fff;outline:none;font-family:inherit}
    .input-row input::placeholder{color:#4b5563}
    .input-row input:focus{border-color:rgba(99,102,241,.4);box-shadow:0 0 0 2px rgba(99,102,241,.15)}
    .icon-btn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:.2s}
    .icon-btn:active{transform:scale(.9)}
    .btn-send{background:#6366f1;color:#fff}
    .btn-mic{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#9ca3af}
    .btn-mic.recording{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#ef4444;animation:pulse 1.5s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 10px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
    .voice-status{text-align:center;font-size:11px;color:#4b5563;margin-top:6px}
    .typing{display:flex;gap:4px;padding:6px 0}
    .typing span{width:6px;height:6px;background:#6366f1;border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
    .email-panel{background:rgba(19,19,40,.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px;margin:0 16px;padding:16px;display:none;animation:slideIn .3s}
    .email-panel h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:10px}
    .email-panel .desc{font-size:12px;color:#6b7280;margin-bottom:10px}
    .email-add-row{display:flex;gap:8px;margin-bottom:10px}
    .email-add-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;font-size:13px;color:#fff;outline:none;font-family:inherit}
    .email-add-row input::placeholder{color:#4b5563}
    .email-add-row input:focus{border-color:rgba(99,102,241,.4)}
    .email-add-row button{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
    .email-list{display:flex;flex-direction:column;gap:6px}
    .email-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border-radius:8px;padding:8px 12px;font-size:13px;color:#d1d5db}
    .email-item .default-tag{font-size:10px;background:rgba(99,102,241,.2);color:#818cf8;padding:1px 6px;border-radius:4px;margin-left:6px}
    .email-item button{background:none;border:none;color:#6b7280;cursor:pointer;font-size:16px;padding:0 4px}
    .email-item button:hover{color:#ef4444}
    .hdr-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:rgba(255,255,255,.05);color:#9ca3af;font-size:16px;transition:.2s}
    .hdr-btn:hover{background:rgba(255,255,255,.1);color:#fff}
    .install-banner{background:linear-gradient(135deg,#6366f1,#8b5cf6);margin:16px;border-radius:16px;padding:16px;display:none;animation:slideIn .3s}
    .install-banner h3{font-size:14px;font-weight:700;color:#fff}
    .install-banner p{font-size:12px;color:rgba(255,255,255,.7);margin:4px 0 10px}
    .install-banner button{background:#fff;color:#6366f1;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer}
    .install-banner .dismiss{background:transparent;color:rgba(255,255,255,.6);margin-left:8px}
  </style>
</head>
<body>

<header>
  <div class="hdr-left">
    <div class="logo">勤</div>
    <div class="hdr-info">
      <h1>出勤查詢助手</h1>
      <p>打字或語音，直接查詢出勤請假</p>
    </div>
  </div>
  <button class="hdr-btn" onclick="toggleEmailPanel()" title="Email 設定">📧</button>
</header>

<div class="email-panel" id="emailPanel">
  <h3>📧 Email 收件人設定</h3>
  <p class="desc">查詢結果會自動寄送報表到以下 Email</p>
  <div class="email-add-row">
    <input type="email" id="newEmail" placeholder="輸入 Email 地址" onkeydown="if(event.key==='Enter'){event.preventDefault();addEmail()}">
    <button onclick="addEmail()">新增</button>
  </div>
  <div class="email-list" id="emailList"></div>
</div>

<div id="installBanner" class="install-banner">
  <h3>📱 安裝到手機/電腦</h3>
  <p>將此查詢助手加到桌面，像 App 一樣使用</p>
  <button onclick="installPWA()">安裝</button>
  <button class="dismiss" onclick="dismissInstall()">稍後</button>
</div>

<div id="chatArea">
  <div class="msg">
    <div class="avatar bot">⚡</div>
    <div class="bubble bot">
      <p>你好！我是<b>出勤查詢助手</b>。</p>
      <p style="margin-top:8px">直接輸入或說出查詢指令，例如：</p>
      <p style="color:#9ca3af;margin-top:6px;font-size:13px">
        • 4/2 請假狀況<br>
        • 3/15 病假統計<br>
        • TAO1 4/2 出勤報表<br>
        • 全部倉 4/2 請假統計
      </p>
      <p style="margin-top:8px;font-size:12px;color:#6b7280">查詢結果會同時寄 Email 報表 📧</p>
    </div>
  </div>
</div>

<div class="quick-row" id="quickBtns">
  <button class="qbtn" onclick="send('4/2請假狀況')">4/2 請假狀況</button>
  <button class="qbtn" onclick="send('4/2病假統計')">4/2 病假統計</button>
  <button class="qbtn" onclick="send('3/15請假狀況')">3/15 請假狀況</button>
  <button class="qbtn" onclick="send('TAO1 4/2出勤報表')">TAO1 出勤報表</button>
  <button class="qbtn" onclick="send('全倉 4/2請假統計')">全倉請假統計</button>
</div>

<div class="input-bar">
  <div class="input-row">
    <input type="text" id="qi" placeholder="輸入查詢，例如：4/2請假狀況" enterkeyhint="send"
      onkeydown="if(event.key==='Enter'){event.preventDefault();sendInput()}">
    <button class="icon-btn btn-mic" id="micBtn" onclick="toggleVoice()">🎤</button>
    <button class="icon-btn btn-send" onclick="sendInput()">↑</button>
  </div>
  <div class="voice-status" id="voiceStatus"></div>
</div>

<script>
const WEBHOOK = '/api/query';
const chat = document.getElementById('chatArea');
const qi = document.getElementById('qi');

// --- Email 管理 ---
const DEFAULT_EMAIL = 'erin20080306@gmail.com';
function getEmails() {
  const saved = localStorage.getItem('emailRecipients');
  if (saved) try { return JSON.parse(saved); } catch(e) {}
  return [DEFAULT_EMAIL];
}
function saveEmails(list) { localStorage.setItem('emailRecipients', JSON.stringify(list)); }
function renderEmails() {
  const list = getEmails();
  const el = document.getElementById('emailList');
  el.innerHTML = list.map((e, i) => {
    const isDefault = e === DEFAULT_EMAIL;
    return '<div class="email-item"><span>' + esc(e) + (isDefault ? '<span class="default-tag">預設</span>' : '') + '</span>'
      + (isDefault ? '' : '<button onclick="removeEmail(' + i + ')" title="移除">✕</button>')
      + '</div>';
  }).join('');
}
function addEmail() {
  const input = document.getElementById('newEmail');
  const email = input.value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { input.style.borderColor = '#ef4444'; setTimeout(() => input.style.borderColor = '', 1500); return; }
  const list = getEmails();
  if (list.includes(email)) { input.value = ''; return; }
  list.push(email);
  saveEmails(list);
  input.value = '';
  renderEmails();
}
function removeEmail(i) {
  const list = getEmails();
  if (list[i] === DEFAULT_EMAIL) return;
  list.splice(i, 1);
  saveEmails(list);
  renderEmails();
}
function toggleEmailPanel() {
  const panel = document.getElementById('emailPanel');
  const show = panel.style.display === 'none' || !panel.style.display;
  panel.style.display = show ? 'block' : 'none';
  if (show) renderEmails();
}
renderEmails();

function sendInput() {
  const q = qi.value.trim();
  if (!q) return;
  qi.value = '';
  send(q);
}

async function send(query) {
  addMsg('user', query);
  const lid = addLoading();
  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, emails: getEmails() }),
    });
    const data = await res.json();
    removeEl(lid);
    showResult(data);
  } catch (e) {
    removeEl(lid);
    addMsg('bot', '連線失敗：' + e.message + '\n\n請確認 n8n 和 proxy 已啟動\nbash start.sh', true);
  }
}

function addMsg(role, text, isError) {
  const d = document.createElement('div');
  d.className = 'msg' + (role === 'user' ? ' user' : '');
  const av = role === 'user' ? '<div class="avatar user">👤</div>' : '<div class="avatar bot">⚡</div>';
  const bc = role === 'user' ? 'bubble user' : (isError ? 'bubble bot error' : 'bubble bot');
  d.innerHTML = av + '<div class="' + bc + '"><pre>' + esc(text) + '</pre></div>';
  chat.appendChild(d);
  scroll();
}

function showResult(data) {
  const d = document.createElement('div');
  d.className = 'msg';
  let html = '<div class="avatar bot">⚡</div><div class="bubble bot">';

  if (data.success === false && data.error) {
    html += '<pre style="color:#f87171">' + esc(data.error) + '</pre>';
    if (data.hint) html += '<pre style="color:#6b7280;font-size:12px">' + esc(data.hint) + '</pre>';
  } else if (data.summaryText) {
    const lines = data.summaryText.split('\n');
    const title = lines[0] || '';
    html += '<div class="summary-title">' + esc(title) + '</div>';

    // 人員明細
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (line.startsWith('【')) {
        html += '<div class="leave-group-title">' + esc(line) + '</div>';
      } else if (line.trim().startsWith('TAO') || line.trim().match(/^\s/)) {
        html += '<div class="leave-person">' + esc(line) + '</div>';
      } else if (line.trim()) {
        html += '<div class="leave-person">' + esc(line) + '</div>';
      }
    }

    // 統計卡片
    if (data.totals) {
      html += '<div class="stats-grid">';
      for (const [k, v] of Object.entries(data.totals)) {
        if (typeof v !== 'object') {
          html += '<div class="stat-card"><div class="stat-label">' + fmtKey(k) + '</div><div class="stat-value">' + esc(String(v)) + '</div></div>';
        }
      }
      html += '</div>';
      for (const [k, v] of Object.entries(data.totals)) {
        if (typeof v === 'object' && Object.keys(v).length > 0) {
          html += '<div style="margin-top:6px"><div style="font-size:11px;color:#6b7280;margin-bottom:4px">' + fmtKey(k) + '</div>';
          for (const [k2, v2] of Object.entries(v)) {
            const disp = typeof v2 === 'object' ? (v2.count || 0) + ' 人' : v2;
            html += '<span style="display:inline-block;background:rgba(255,255,255,.04);border-radius:6px;padding:2px 8px;margin:2px 4px 2px 0;font-size:11px;color:#d1d5db">' + esc(k2) + '：' + disp + '</span>';
          }
          html += '</div>';
        }
      }
    }

    // Email 狀態
    if (data.email) {
      const emailText = typeof data.email === 'string' ? data.email : (data.email.message || '');
      if (emailText.includes('已寄送')) {
        html += '<div class="email-badge">📧 ' + esc(emailText) + '</div>';
      }
    }
  } else {
    html += '<pre>' + esc(JSON.stringify(data, null, 2).substring(0, 500)) + '</pre>';
  }

  html += '</div>';
  d.innerHTML = html;
  chat.appendChild(d);
  scroll();
}

function addLoading() {
  const d = document.createElement('div');
  d.className = 'msg';
  d.id = 'loading-' + Date.now();
  d.innerHTML = '<div class="avatar bot">⚡</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(d);
  scroll();
  return d.id;
}

function removeEl(id) { const el = document.getElementById(id); if (el) el.remove(); }
function scroll() { setTimeout(() => chat.scrollTop = chat.scrollHeight, 50); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtKey(k) {
  const map = { totalLeave:'請假總人數', totalSickLeave:'病假總人數', totalRecords:'總筆數',
    totalWorkHours:'總工時', totalOvertimeHours:'總加班時數',
    byWarehouse:'各倉別', byLeaveType:'各假別', byDepartment:'各部門', byShift:'各班別' };
  return map[k] || k;
}

// --- 語音輸入 ---
let recognition = null;
let isRecording = false;
const micBtn = document.getElementById('micBtn');
const voiceStatus = document.getElementById('voiceStatus');

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    voiceStatus.textContent = '此瀏覽器不支援語音輸入';
    voiceStatus.style.display = 'block';
    return;
  }
  if (isRecording) { stopVoice(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    micBtn.className = 'icon-btn btn-mic recording';
    micBtn.textContent = '⏹';
    voiceStatus.textContent = '🎤 聆聽中...';
    voiceStatus.style.display = 'block';
  };
  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
    qi.value = text;
    if (e.results[0].isFinal) { stopVoice(); sendInput(); }
  };
  recognition.onerror = (e) => { voiceStatus.textContent = '語音錯誤：' + e.error; stopVoice(); };
  recognition.onend = () => stopVoice();
  recognition.start();
}

function stopVoice() {
  isRecording = false;
  micBtn.className = 'icon-btn btn-mic';
  micBtn.textContent = '🎤';
  voiceStatus.style.display = 'none';
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
}

// --- PWA 安裝 ---
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); });
}
function dismissInstall() { document.getElementById('installBanner').style.display = 'none'; }

// --- Service Worker ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
